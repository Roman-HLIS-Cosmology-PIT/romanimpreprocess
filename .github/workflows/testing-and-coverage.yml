
# This workflow will install Python dependencies, run tests and report code coverage with a variety of Python versions
# For more information see: https://help.github.com/actions/language-and-framework-guides/using-python-with-github-actions

name: Unit test and code coverage

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:

    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.11', '3.12', '3.13', '3.14']

    steps:
    - uses: actions/checkout@v4
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y libfftw3-dev
        python -m pip install --upgrade pip
        pip install -e .[dev]
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
    - name: Install stpsf data
      run: |
        # This is STScI's path to the STPSF data. We don't use this, but romanisim needs it to be there.
        curl -L https://stsci.box.com/shared/static/z4wt613tg9txgfo5gc4qkvco1jzg74xe.gz \
          -o minimal_stpsf-data-2.1.0.tar.gz
        gunzip minimal_stpsf-data-2.1.0.tar.gz
        tar -xf minimal_stpsf-data-2.1.0.tar
        pwd
        ls -alt
        echo ""
        mv stpsf-data $RUNNER_TEMP/
        setenv STPSF_PATH=$RUNNER_TEMP/stpsf-data
        # The below are just for testing
        echo $STPSF_PATH
        ls $STPSF_PATH
    - name: Run unit tests with pytest
      run: |
        python -m pytest --cov=romanimpreprocess --cov-report=xml
    - name: Upload coverage report to codecov
      uses: codecov/codecov-action@v5
      with:
        token: ${{ secrets.CODECOV_TOKEN }}
        slug: Roman-HLIS-Cosmology-PIT/romanimpreprocess
